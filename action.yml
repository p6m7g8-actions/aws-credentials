name: P6 AWS credentials setup
description: Centralized wrapper around aws-actions/configure-aws-credentials

inputs:
  aws-region:
    description: AWS region
    required: true
  aws-access-key-id:
    description: AWS access key id
    required: false
  aws-secret-access-key:
    description: AWS secret access key
    required: false
  role-to-assume:
    description: IAM role ARN to assume
    required: false
  role-session-name:
    description: Role session name
    required: false
    default: GitHubActions
  audience:
    description: Audience for OIDC (China partitions)
    required: false
  mask-aws-account-id:
    description: Whether to mask account id in logs
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6.0.0
      with:
        aws-region: ${{ inputs.aws-region }}
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        role-to-assume: ${{ inputs.role-to-assume }}
        role-session-name: ${{ inputs.role-session-name }}
        audience: ${{ inputs.audience }}
        mask-aws-account-id: ${{ inputs.mask-aws-account-id }}
